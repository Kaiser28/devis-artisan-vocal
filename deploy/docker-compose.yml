version: '3.8'

services:
  # =======================================
  # Service API principale (FastAPI)
  # =======================================
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: artisan-chatbot-api
    restart: unless-stopped
    
    ports:
      - "8000:8000"
    
    environment:
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - REDIS_URL=redis://redis:6379
    
    env_file:
      - ../.env
    
    volumes:
      # Monter dossiers persistants
      - ../output:/app/output
      - ../config:/app/config:ro
      - ../logs:/app/logs
    
    depends_on:
      - redis
    
    networks:
      - artisan-network
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
  
  # =======================================
  # Redis (cache mémoire conversations)
  # =======================================
  redis:
    image: redis:7-alpine
    container_name: artisan-chatbot-redis
    restart: unless-stopped
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis-data:/data
    
    networks:
      - artisan-network
    
    command: redis-server --appendonly yes
    
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =======================================
  # Nginx (reverse proxy optionnel)
  # =======================================
  nginx:
    image: nginx:alpine
    container_name: artisan-chatbot-nginx
    restart: unless-stopped
    
    ports:
      - "80:80"
      - "443:443"
    
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    
    depends_on:
      - api
    
    networks:
      - artisan-network

# =======================================
# Volumes persistants
# =======================================
volumes:
  redis-data:
    driver: local

# =======================================
# Réseau interne
# =======================================
networks:
  artisan-network:
    driver: bridge
