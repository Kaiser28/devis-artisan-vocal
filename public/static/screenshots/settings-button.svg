<svg width="600" height="300" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="300" fill="#f9fafb"/>
  
  <!-- Navigation bar -->
  <rect x="0" y="0" width="600" height="60" fill="#1f2937"/>
  
  <!-- Bouton Paramètres en highlight -->
  <rect x="450" y="15" width="130" height="30" fill="#374151" rx="6"/>
  <text x="465" y="35" font-family="Arial" font-size="14" fill="white" font-weight="bold">⚙️ Paramètres</text>
  
  <!-- Flèche pointant vers le bouton -->
  <path d="M 515 80 L 515 55" stroke="#ef4444" stroke-width="4" fill="none" marker-end="url(#arrowhead)"/>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0 0, 10 5, 0 10" fill="#ef4444"/>
    </marker>
  </defs>
  
  <!-- Text annotation -->
  <rect x="400" y="100" width="180" height="40" fill="#fee2e2" rx="6" stroke="#ef4444" stroke-width="2"/>
  <text x="490" y="125" font-family="Arial" font-size="14" fill="#991b1b" text-anchor="middle" font-weight="bold">
    Cliquez ici ☝️
  </text>
  
  <!-- Mockup du reste de l'interface -->
  <rect x="20" y="100" width="300" height="180" fill="white" rx="8" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="30" y="110" width="280" height="20" fill="#f3f4f6" rx="4"/>
  <rect x="30" y="140" width="280" height="60" fill="#f3f4f6" rx="4"/>
  <rect x="30" y="210" width="280" height="60" fill="#f3f4f6" rx="4"/>
</svg>
